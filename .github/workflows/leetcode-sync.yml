name: Sync Leetcode

on:
  workflow_dispatch:       # Allows you to manually trigger the sync
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sync
        # NOTE: If this step fails with "submissionList.submissions is not iterable",
        # your LEETCODE_SESSION and LEETCODE_CSRF_TOKEN secrets have expired.
        # To fix: log into leetcode.com, open browser DevTools → Network, refresh the
        # page, find a request to leetcode.com, and copy the fresh `csrftoken` and
        # `LEETCODE_SESSION` cookie values into your repository's GitHub Secrets.
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          # destination-folder: my-solutions   # (Optional) Change the destination folder
          # verbose: true                      # (Optional) Enable verbose logging
          # commit-header: "LeetCode Sync"     # (Optional) Custom commit message header
